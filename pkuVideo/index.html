<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Download m3u8 Video</title>
    <link rel="stylesheet" href="./style.css"> <!-- 引入CSS样式 -->
    <script>
        function extractAndRedirect() {
            var inputUrl = document.getElementById("videoUrl").value;
            var resourceIdPattern = /https:\/\/resourcese\.pku\.edu\.cn\/play\/0\/harpocrates\/\d*\/\d*\/\d*\/([a-zA-Z0-9]+)\/0\/playlist\.m3u8\?.*/;
            var match = inputUrl.match(resourceIdPattern);
        
            if (match && match.length > 1) {
                // match[1] 是捕获到的散列值
                var hash = match[1];
                // 构造新的下载链接
                var downloadUrl = "https://course.pku.edu.cn/webapps/bb-streammedia-hqy-BBLEARN/downloadVideo.action?resourceId=" + hash;
                // console.log("Redirecting to: " + downloadUrl);
                // 如果在实际应用中使用, 可以使用下面的代码跳转到该链接
                window.location.href = downloadUrl;
            } else {
                // 未匹配到散列值
                console.error("No valid hash found in the URL.");
            }
        }
    </script>
</head>
<body>
    <div class="center-container"> <!-- 添加包裹容器 -->
        <input type="text" id="videoUrl" placeholder="Enter m3u8 URL here">
        <button onclick="extractAndRedirect()">Download Video</button>
    </div>
    <div class="donation">
        Reference: <span class="coin-address">#6019717</span>
    </div>
</body>

</html>
